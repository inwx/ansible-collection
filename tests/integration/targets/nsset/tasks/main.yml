# ---------------------------------------------------------------------------
# Warning: web/mail/hostmaster on non-PRIMARY types
# ---------------------------------------------------------------------------
- name: SECONDARY nsset with web/mail/hostmaster emits warnings
  block:
    - name: Create SECONDARY nsset with web/mail/hostmaster (should warn)
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: secondary-web-mail-hostmaster-test
        type: secondary
        ns:
          - ns.inwx.de
          - ns2.inwx.de
          - ns3.inwx.de
        web: 192.0.2.1
        mail: 192.0.2.1
        hostmaster: hostmaster@inwx.de
      register: result
    - name: Assert warnings were emitted for web, mail, hostmaster
      ansible.builtin.assert:
        that:
          - result.warnings | select('search', 'web') | list | length > 0
          - result.warnings | select('search', 'mail') | list | length > 0
          - result.warnings | select('search', 'hostmaster') | list | length > 0
        fail_msg: "Expected warnings for web/mail/hostmaster on SECONDARY type"
  always:
    - name: Cleanup SECONDARY nsset with web/mail/hostmaster
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: secondary-web-mail-hostmaster-test
        state: absent
      ignore_errors: true
