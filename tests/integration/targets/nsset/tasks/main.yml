# Integration tests for inwx.collection.nsset
#
# Requires tests/integration/integration_config.yml with at minimum:
#   inwx_username, inwx_password, inwx_api_env
# Optionally:
#   inwx_shared_secret  (for 2FA accounts)
#
# Run with:
#   ansible-test integration nsset
- name: Retrieve session (2FA)
  inwx.collection.session:
    username: "{{ inwx_username }}"
    password: "{{ inwx_password }}"
    shared_secret: "{{ inwx_shared_secret }}"
    api_env: "{{ inwx_api_env | default('ote') }}"
  register: inwx_session_output
  when: inwx_shared_secret is defined
- name: Set session fact
  ansible.builtin.set_fact:
    inwx_session: "{{ inwx_session_output.result.session }}"
  when: inwx_shared_secret is defined
# ---------------------------------------------------------------------------
# PRIMARY nsset lifecycle
# ---------------------------------------------------------------------------
- name: PRIMARY nsset lifecycle
  block:
    - name: Create PRIMARY nsset
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        type: primary
        ns:
          - ns.inwx.de
          - ns2.inwx.de
          - ns3.inwx.de
        hostmaster: hostmaster@inwx.de
      register: result
    - name: Assert creation changed
      ansible.builtin.assert:
        that: result.changed
        fail_msg: "Expected changed=true on initial create"
    - name: Create PRIMARY nsset again (idempotency)
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        type: primary
        ns:
          - ns.inwx.de
          - ns2.inwx.de
          - ns3.inwx.de
        hostmaster: hostmaster@inwx.de
      register: result
    - name: Assert no change on idempotent create
      ansible.builtin.assert:
        that: not result.changed
        fail_msg: "Expected changed=false on idempotent create"
    - name: Update PRIMARY nsset (change ns)
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        type: primary
        ns:
          - a.xnameserver.de
          - b.xnameserver.de
          - c.xnameserver.de
        hostmaster: hostmaster@inwx.de
      register: result
    - name: Assert update changed
      ansible.builtin.assert:
        that: result.changed
        fail_msg: "Expected changed=true on ns update"
    - name: Delete PRIMARY nsset
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        state: absent
      register: result
    - name: Assert deletion changed
      ansible.builtin.assert:
        that: result.changed
        fail_msg: "Expected changed=true on delete"
    - name: Delete PRIMARY nsset again (idempotency)
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        state: absent
      register: result
    - name: Assert no change on idempotent delete
      ansible.builtin.assert:
        that: not result.changed
        fail_msg: "Expected changed=false on idempotent delete"
  always:
    - name: Cleanup PRIMARY nsset
      inwx.collection.nsset:
        username: "{{ inwx_username | default(omit) }}"
        password: "{{ inwx_password | default(omit) }}"
        session: "{{ inwx_session | default(omit) }}"
        api_env: "{{ inwx_api_env | default('ote') }}"
        name: primary-test
        state: absent
      ignore_errors: true
